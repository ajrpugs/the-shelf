<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt: #16241F;
    --felt-dark: #101B17;
    --card: #F2E8D5;
    --card-shadow: #d8c9a8;
    --ink: #26231C;
    --ink-soft: #6b6455;
    --stamp: #A23E2F;
    --green: #3D5A4C;
    --brass: #B99657;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.03), transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px),
      var(--felt);
    min-height: 100vh;
    font-family: 'Courier Prime', monospace;
    color: var(--card);
    padding: 32px 16px 80px;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }

  header{ text-align:center; margin-bottom: 36px; }
  .eyebrow{
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 10px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(40px, 9vw, 64px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .sub{
    font-size: 13px;
    color: #a9b8ae;
    margin-top: 10px;
    letter-spacing: 0.03em;
  }
  .rule{
    width: 64px; height: 2px; background: var(--stamp);
    margin: 18px auto 0;
  }

  section{ margin-bottom: 30px; }
  .section-title{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 19px;
    color: var(--brass);
    margin: 0 0 12px 2px;
  }

  .card{
    background: var(--card);
    color: var(--ink);
    border-radius: 2px;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    padding: 16px 18px;
    position: relative;
    margin-bottom: 10px;
  }
  .card.no-rule::before { display:none; }
  .card:not(.no-rule)::before{
    content:"";
    position:absolute; left:0; right:0; top:38px;
    height:1px; background: rgba(162,62,47,0.25);
  }
  .card-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex-wrap: wrap;
  }
  .name{
    font-family:'Fraunces', serif; font-weight:600; font-size:16px;
  }
  .submitted-book{
    margin-top: 14px;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .card.eliminated{
    opacity: 0.55;
  }
  .stamp-mark{
    display:inline-block;
    border: 2px solid var(--stamp);
    color: var(--stamp);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    transform: rotate(-4deg);
    border-radius: 3px;
  }

  input[type=text], input[type=password]{
    font-family: 'Courier Prime', monospace;
    background: white;
    border: 1px solid rgba(38,35,28,0.2);
    padding: 10px 12px;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    border-radius: 2px;
  }
  input[type=text]::placeholder{ color: var(--ink-soft); opacity: 0.7; }
  input[type=text]:focus, input[type=password]:focus{ border-color: var(--stamp); }

  button{
    font-family: 'Courier Prime', monospace;
    cursor: pointer;
    border: none;
    border-radius: 2px;
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    transition: transform 0.1s ease;
  }
  button:active{ transform: scale(0.97); }
  button:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn-primary{ background: var(--stamp); color: var(--card); }
  .btn-ghost{ background: transparent; color: var(--card); border: 1px solid rgba(255,255,255,0.25); }
  .btn-mini{ background: var(--green); color: var(--card); padding: 6px 10px; font-size: 11px; }
  .btn-mini.remove{ background: transparent; color: var(--stamp); border: 1px solid var(--stamp); }

  /* Submit form */
  .submit-form{ display: grid; gap: 8px; }
  .submit-form label{
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stamp);
    margin-top: 4px;
  }
  .submit-form input{ width: 100%; }
  .submit-form button{ margin-top: 10px; padding: 12px 14px; font-size: 12.5px; }
  .submit-hint{
    font-size: 12px; color: var(--ink-soft); margin-top: 12px; font-style: italic;
  }
  .submit-warning{
    background: rgba(162,62,47,0.12); color: var(--stamp);
    border-radius: 2px; padding: 8px 10px;
    font-size: 12.5px; margin-top: 10px;
  }

  /* Wheel */
  .wheel-holder{
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1;
    margin: 0 auto 16px;
    padding: 22px 0 0;
  }
  .wheel-canvas{
    display: block;
    width: 100%;
    height: calc(100% - 22px);
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.45));
  }
  .wheel-pointer{
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--brass);
    z-index: 2;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .wheel-empty{
    text-align: center;
    padding: 60px 20px;
    color: var(--brass);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    border: 1px dashed rgba(185,150,87,0.35);
    border-radius: 4px;
    background: rgba(0,0,0,0.15);
    max-width: 420px;
    margin: 0 auto 16px;
  }
  .spin-caption{
    text-align: center;
    font-size: 12px;
    color: #a9b8ae;
    margin-top: 8px;
    font-style: italic;
  }
  .spin-actions{
    text-align: center;
    margin-top: 10px;
  }
  .spin-actions button{
    padding: 12px 28px;
    font-size: 13px;
  }

  .winner-banner{
    background: var(--card);
    color: var(--ink);
    border-radius: 3px;
    padding: 20px;
    text-align:center;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    margin-top: 16px;
    margin-bottom: 20px;
  }
  .winner-banner .stampbig{
    display:inline-block;
    border: 3px solid var(--stamp);
    color: var(--stamp);
    font-family:'Fraunces', serif;
    font-weight:700;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding: 4px 12px;
    transform: rotate(-3deg);
    border-radius: 4px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .winner-banner .wbook{
    font-family:'Fraunces', serif; font-weight:700; font-size: 26px;
    line-height: 1.15;
  }
  .winner-banner .wname{ font-size: 13px; color: var(--ink-soft); margin-top: 8px; font-style: italic; letter-spacing: 0.04em; }
  .winner-banner .wname b{ color: var(--ink); font-weight: 700; font-style: normal; }

  .cycle-banner{
    background: var(--green); color: var(--card);
    border-radius: 3px; padding: 12px 16px; font-size: 12.5px;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .flash{
    background: var(--stamp); color: var(--card);
    border-radius: 3px; padding: 10px 14px; font-size: 12px;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .flash.info{ background: var(--green); }

  .history-item{
    display:flex; justify-content:space-between; gap: 10px;
    font-size: 12.5px; padding: 8px 2px; border-bottom: 1px dotted rgba(38,35,28,0.15);
    color: var(--ink-soft);
  }
  .history-item:last-child{ border-bottom: none; }
  .history-item .h-who{ color: var(--ink); font-weight: 700; }
  .empty-note{ font-size: 12.5px; color: #93a19a; padding: 6px 2px; }

  /* Reading Room / dashboard */
  .stat-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 560px){ .stat-grid{ grid-template-columns: repeat(2, 1fr); } }
  .stat-card{
    background: var(--card);
    color: var(--ink);
    border-radius: 2px;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    padding: 14px 14px 16px;
    text-align: left;
  }
  .stat-card .stat-label{
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stamp);
    margin-bottom: 6px;
  }
  .stat-card .stat-number{
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 34px; line-height: 1;
  }
  .stat-card .stat-suffix{
    font-size: 11px; color: var(--ink-soft); margin-top: 4px; font-style: italic;
  }

  .leader-row{
    display:flex; align-items:center; gap: 10px;
    padding: 6px 0;
    font-size: 13px; color: var(--ink);
  }
  .leader-row .lname{ min-width: 120px; font-family:'Fraunces', serif; font-weight: 600; }
  .leader-row .lbar{
    flex: 1; height: 8px; background: rgba(162,62,47,0.15); border-radius: 999px; overflow: hidden;
  }
  .leader-row .lbar > span{ display:block; height: 100%; background: var(--stamp); }
  .leader-row .lcount{ min-width: 24px; text-align: right; color: var(--ink-soft); font-size: 12px; }

  footer{
    text-align:center; margin-top: 40px; font-size: 11px; color: #7f8f84;
  }
  footer button{ margin-top: 8px; margin-left: 4px; margin-right: 4px; }

  .loading{ text-align:center; padding: 60px 0; color: var(--brass); font-family:'Fraunces',serif; font-style: italic; }

  .setup{
    background: var(--card); color: var(--ink); border-radius: 3px;
    padding: 20px; box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
  }
  .setup h2{ font-family:'Fraunces',serif; margin: 0 0 8px; color: var(--stamp); }
  .setup code{
    display:block; background: #efe3c8; padding: 8px 10px; border-radius: 2px;
    font-size: 12px; word-break: break-all; margin: 6px 0;
  }
  .setup p{ font-size: 13px; }

  .librarian-tag{
    display:inline-block; background: var(--brass); color: var(--felt);
    padding: 2px 8px; border-radius: 2px; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 700; margin-left: 8px;
  }

  /* Modal */
  .modal-back{
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 40; padding: 20px;
  }
  .modal{
    background: var(--card); color: var(--ink); padding: 22px 20px;
    border-radius: 3px; max-width: 380px; width: 100%;
    box-shadow: 0 6px 0 var(--card-shadow), 0 20px 40px rgba(0,0,0,0.5);
  }
  .modal h3{ font-family:'Fraunces',serif; margin: 0 0 6px; }
  .modal p{ font-size: 13px; color: var(--ink-soft); margin: 0 0 12px; }
  .modal input{
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--ink-soft); border-radius: 2px;
    font-family:'Courier Prime', monospace; background: white; color: var(--ink);
  }
  .modal-actions{ display:flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  .modal-actions button.btn-primary{ background: var(--stamp); color: var(--card); }
  .modal-actions button.btn-ghost{
    background: transparent; border: 1px solid var(--ink-soft); color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Pulling the ledger…</div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// ---------- Configuration ----------
const SUPABASE_URL = "https://yoobgxxyvcmsianfczam.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Ovyd_-OHfFzfUlT2mtirfw_73i3sYWv";

const CONFIGURED = !SUPABASE_URL.startsWith("REPLACE_") && !SUPABASE_ANON_KEY.startsWith("REPLACE_");
const supabase = CONFIGURED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// ---------- State ----------
const emptyState = () => ({ eliminated: [], history: [], roundNumber: 1 });
let state = emptyState();
let submissions = {};
let spinning = false;
let flashMsg = null;
let pendingRender = false;

const SAVED_NAME_KEY = "shelf-my-name";
const savedName = () => localStorage.getItem(SAVED_NAME_KEY) || "";
const saveName = (name) => localStorage.setItem(SAVED_NAME_KEY, name);

const setFlash = (kind, text) => {
  flashMsg = { kind, text };
  setTimeout(() => { if (flashMsg && flashMsg.text === text) { flashMsg = null; render(); } }, 4000);
};

// Normalize legacy field names (cycleNumber → roundNumber, cycle → round).
function normalizeState(raw) {
  const r = raw || {};
  return {
    eliminated: Array.isArray(r.eliminated) ? r.eliminated : [],
    history: Array.isArray(r.history) ? r.history.map(h => ({
      round: h.round ?? h.cycle ?? 1,
      winner: h.winner,
      book: h.book,
      ts: h.ts,
    })) : [],
    roundNumber: r.roundNumber ?? r.cycleNumber ?? 1,
  };
}

// ---------- Admin session ----------
const ADMIN_KEY = "shelf-admin-pw";
const isAdmin = () => !!sessionStorage.getItem(ADMIN_KEY);
const getAdminPw = () => sessionStorage.getItem(ADMIN_KEY) || "";
const setAdminPw = (pw) => sessionStorage.setItem(ADMIN_KEY, pw);
const clearAdminPw = () => sessionStorage.removeItem(ADMIN_KEY);

async function callAdmin(action, payload = {}) {
  const pw = getAdminPw();
  if (!pw) { promptLibrarianPassword(action, payload); return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ password: pw, action, payload }),
    });
    if (res.status === 401) {
      clearAdminPw();
      setFlash("err", "Wrong password. Locked back out.");
      render();
      return;
    }
    if (!res.ok) {
      const t = await res.text().catch(() => "");
      setFlash("err", `Admin action failed: ${t || res.statusText}`);
      return;
    }
    const body = await res.json();
    if (body.state) state = normalizeState(body.state);
    if (body.submissions) submissions = body.submissions;
    if (body.poolReset) setFlash("info", "Pool reset — everyone's back in the stacks.");
    render();
  } catch (err) {
    setFlash("err", `Network error: ${err.message}`);
  }
}

function promptLibrarianPassword(retryAction, retryPayload) {
  const back = document.createElement("div");
  back.className = "modal-back";
  back.innerHTML = `
    <div class="modal">
      <h3>Librarian Mode</h3>
      <p>Enter the admin password to unlock spinning the wheel and starting a new round.</p>
      <input type="password" id="pw-input" autocomplete="current-password" placeholder="Password" />
      <div class="modal-actions">
        <button class="btn-ghost" id="pw-cancel">Cancel</button>
        <button class="btn-primary" id="pw-ok">Unlock</button>
      </div>
    </div>
  `;
  document.body.appendChild(back);
  const input = back.querySelector("#pw-input");
  input.focus();
  const close = () => document.body.removeChild(back);
  back.querySelector("#pw-cancel").addEventListener("click", close);
  const submit = async () => {
    const pw = input.value.trim();
    if (!pw) return;
    setAdminPw(pw);
    close();
    if (retryAction) callAdmin(retryAction, retryPayload);
    else render();
  };
  back.querySelector("#pw-ok").addEventListener("click", submit);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
}

// ---------- Data loading ----------
async function loadAll() {
  if (!CONFIGURED) { render(); return; }
  try {
    const [{ data: sData, error: sErr }, { data: subData, error: subErr }] = await Promise.all([
      supabase.from("shelf_state").select("data").eq("id", 1).single(),
      supabase.from("shelf_submissions").select("member_name, book"),
    ]);
    if (sErr && sErr.code !== "PGRST116") throw sErr;
    if (subErr) throw subErr;
    state = normalizeState(sData && sData.data);
    submissions = {};
    (subData || []).forEach(r => { submissions[r.member_name] = r.book; });
  } catch (err) {
    setFlash("err", `Couldn't load: ${err.message}`);
  }
  render();
}

function subscribeRealtime() {
  if (!CONFIGURED) return;
  supabase.channel("shelf-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "shelf_state" }, () => queueRefresh())
    .on("postgres_changes", { event: "*", schema: "public", table: "shelf_submissions" }, () => queueRefresh())
    .subscribe();
}
let refreshTimer = null;
function queueRefresh() {
  if (refreshTimer) return;
  refreshTimer = setTimeout(() => { refreshTimer = null; loadAll(); }, 300);
}

// ---------- Book submission (open to anyone) ----------
function normName(n) { return (n || "").trim().toLowerCase(); }
function isEliminated(name) {
  return state.eliminated.some(e => normName(e) === normName(name));
}

async function submitMyBook(name, book) {
  if (!CONFIGURED) return;
  name = name.trim();
  book = book.trim();
  if (!name || !book) return;

  if (isEliminated(name)) {
    setFlash("err", `${name} has already been picked. Wait for the shelf to turn over.`);
    render();
    return;
  }

  const existingKey = Object.keys(submissions).find(k => normName(k) === normName(name));
  const canonical = existingKey || name;

  try {
    await supabase.from("shelf_submissions").upsert({ member_name: canonical, book });
    submissions[canonical] = book;
    saveName(canonical);
    setFlash("info", existingKey ? `Updated ${canonical}'s pick to "${book}".` : `Added ${canonical} to the wheel.`);
    render();
  } catch (err) {
    setFlash("err", `Couldn't save: ${err.message}`);
  }
}

async function withdrawSubmission(name) {
  if (!confirm(`Withdraw ${name}'s submission?`)) return;
  try {
    await supabase.from("shelf_submissions").delete().eq("member_name", name);
    delete submissions[name];
    setFlash("info", `${name} withdrew.`);
    render();
  } catch (err) {
    setFlash("err", `Couldn't withdraw: ${err.message}`);
  }
}

// ---------- Wheel ----------
const WHEEL_COLORS = [
  "#A23E2F", "#3D5A4C", "#B99657", "#7a4c26", "#4a5d6c", "#8a3f5f",
  "#5f6b3d", "#c07141"
];

function eligibleEntries() {
  return Object.entries(submissions)
    .filter(([n]) => !isEliminated(n))
    .map(([name, book]) => ({ name, book }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

function drawWheel(canvas, entries, rotation) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const size = Math.max(200, Math.round(rect.width || 320));
  if (canvas.width !== size * dpr) {
    canvas.width = size * dpr;
    canvas.height = size * dpr;
  }
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2;
  const cy = size / 2;
  const radius = size / 2 - 6;
  const N = entries.length;
  if (N === 0) return;

  const anglePer = (2 * Math.PI) / N;
  const bookFontSize = N > 12 ? 11 : N > 8 ? 12 : 14;
  const nameFontSize = N > 12 ? 9 : N > 8 ? 10 : 11;
  const maxWidth = radius - 44;

  function truncateToWidth(text, font) {
    ctx.font = font;
    let display = text;
    while (ctx.measureText(display).width > maxWidth && display.length > 3) {
      display = display.slice(0, -2) + "…";
    }
    return display;
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  entries.forEach((entry, i) => {
    const start = i * anglePer - Math.PI / 2;
    const end = start + anglePer;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "rgba(15, 15, 15, 0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    const mid = (start + end) / 2;
    ctx.rotate(mid);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";

    const bookFont = `600 ${bookFontSize}px "Fraunces", serif`;
    const nameFont = `italic ${nameFontSize}px "Fraunces", serif`;
    const bookDisplay = truncateToWidth(entry.book || "", bookFont);
    const nameDisplay = truncateToWidth(entry.name || "", nameFont);

    ctx.fillStyle = "#F2E8D5";
    ctx.font = bookFont;
    ctx.fillText(bookDisplay, radius - 14, -bookFontSize * 0.55);

    ctx.fillStyle = "rgba(242,232,213,0.82)";
    ctx.font = nameFont;
    ctx.fillText(nameDisplay, radius - 14, bookFontSize * 0.65);

    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, 2 * Math.PI);
  ctx.fillStyle = "#F2E8D5";
  ctx.fill();
  ctx.strokeStyle = "#A23E2F";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.font = 'italic 12px "Fraunces", serif';
  ctx.fillStyle = "#A23E2F";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Shelf", 0, 0);

  ctx.restore();
}

function paintWheel() {
  const canvas = document.getElementById("wheel-canvas");
  if (!canvas) return;
  drawWheel(canvas, eligibleEntries(), 0);
}

async function spinToWinner(canvas, entries, winnerIdx) {
  const N = entries.length;
  const anglePer = (2 * Math.PI) / N;
  const jitter = (Math.random() - 0.5) * anglePer * 0.65;
  const targetR = -(winnerIdx + 0.5) * anglePer + jitter;
  const spins = 6;
  const finalR = targetR + spins * 2 * Math.PI;

  const duration = 5200;
  const start = performance.now();

  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 4);
      const rotation = finalR * eased;
      drawWheel(canvas, entries, rotation);
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

async function runDraw() {
  if (spinning) return;
  const entries = eligibleEntries();
  if (entries.length === 0) { setFlash("err", "No eligible submissions to spin."); return; }
  const pw = getAdminPw();
  if (!pw) { promptLibrarianPassword("draw", {}); return; }

  const canvas = document.getElementById("wheel-canvas");
  const btn = document.getElementById("spin-btn");
  if (!canvas) return;
  spinning = true;
  if (btn) { btn.disabled = true; btn.textContent = "Spinning…"; }

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ password: pw, action: "draw", payload: {} }),
    });
    if (res.status === 401) {
      spinning = false;
      clearAdminPw();
      setFlash("err", "Wrong password. Locked back out.");
      render();
      return;
    }
    if (!res.ok) {
      spinning = false;
      const t = await res.text().catch(() => "");
      setFlash("err", `Draw failed: ${t || res.statusText}`);
      render();
      return;
    }
    const body = await res.json();
    const winner = body.winner || {};
    let winnerIdx = entries.findIndex(e => e.name === winner.name);
    if (winnerIdx < 0) winnerIdx = 0;
    await spinToWinner(canvas, entries, winnerIdx);
    spinning = false;
    if (body.state) state = normalizeState(body.state);
    if (body.submissions) submissions = body.submissions;
    render();
  } catch (err) {
    spinning = false;
    setFlash("err", `Network error: ${err.message}`);
    render();
  }
}

// ---------- Rendering ----------
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str == null ? "" : String(str);
  return d.innerHTML;
}
function attr(str) {
  return String(str == null ? "" : str).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
  catch (e) { return ""; }
}

function computeStats() {
  const total = state.history.length;
  const perMember = {};
  state.history.forEach(h => {
    perMember[h.winner] = (perMember[h.winner] || 0) + 1;
  });
  const leaderboard = Object.entries(perMember).sort((a, b) => b[1] - a[1]);
  const maxPicks = leaderboard.reduce((m, [, c]) => Math.max(m, c), 0);
  const picksThisRound = state.eliminated.length;
  const submittedCount = eligibleEntries().length;
  const regulars = new Set(state.history.map(h => h.winner)).size;
  return { total, leaderboard, maxPicks, picksThisRound, submittedCount, regulars };
}

function render() {
  if (spinning) { pendingRender = true; return; }
  if (document.activeElement && document.activeElement.tagName === "INPUT") {
    pendingRender = true;
    return;
  }
  pendingRender = false;

  const app = document.getElementById("app");

  if (!CONFIGURED) {
    app.innerHTML = renderSetupNotice();
    return;
  }

  const stats = computeStats();
  const admin = isAdmin();
  const myName = savedName();
  const eligibleSubs = Object.entries(submissions)
    .filter(([n]) => !isEliminated(n))
    .sort((a, b) => a[0].localeCompare(b[0]));
  const eligibleCount = eligibleSubs.length;

  let html = `
    <header>
      <div class="eyebrow">Circulation · Round ${state.roundNumber}${admin ? '<span class="librarian-tag">Librarian</span>' : ''}</div>
      <h1>The Shelf</h1>
      <div class="sub">Add your book. Spin the wheel. Once your name lands, you sit out the round.</div>
      <div class="rule"></div>
    </header>
  `;

  if (flashMsg) {
    html += `<div class="flash ${flashMsg.kind === 'info' ? 'info' : ''}">${esc(flashMsg.text)}</div>`;
  }

  const currentPick = state.history[0];
  if (currentPick) {
    html += `
      <div class="winner-banner">
        <div class="stampbig">Next up</div>
        <div class="wbook">${currentPick.book ? esc(currentPick.book) : '—'}</div>
        <div class="wname">picked by <b>${esc(currentPick.winner)}</b></div>
      </div>
    `;
  }

  // ---- Recommend a Book ----
  const meAlreadyPicked = myName && isEliminated(myName);
  html += `
    <section>
      <div class="section-title">Recommend a Book</div>
      <div class="card no-rule">
        <div class="submit-form">
          <label for="my-name">Your name</label>
          <input type="text" id="my-name" placeholder="How you'd like to be listed" value="${attr(myName)}" autocomplete="off" />
          <label for="my-book">Book title</label>
          <input type="text" id="my-book" placeholder="What you'd like the club to read" autocomplete="off" />
          <button class="btn-primary" id="my-submit">Add to the wheel</button>
        </div>
        ${meAlreadyPicked
          ? `<div class="submit-warning">You (<b>${esc(myName)}</b>) have already been picked. Wait for the shelf to turn over before submitting again.</div>`
          : `<div class="submit-hint">Already submitted? Use the same name and it'll update your pick.</div>`
        }
      </div>
    </section>
  `;

  // ---- Reading Room (stats) ----
  html += `<section><div class="section-title">Reading Room</div>`;
  html += `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Books Read</div>
        <div class="stat-number">${stats.total}</div>
        <div class="stat-suffix">all rounds</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Round</div>
        <div class="stat-number">${stats.picksThisRound}</div>
        <div class="stat-suffix">picked so far</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Regulars</div>
        <div class="stat-number">${stats.regulars}</div>
        <div class="stat-suffix">unique winners</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">On the Wheel</div>
        <div class="stat-number">${stats.submittedCount}</div>
        <div class="stat-suffix">awaiting the spin</div>
      </div>
    </div>
  `;
  if (stats.total > 0) {
    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div style="font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--stamp); margin-bottom: 10px;">Reads by Reader</div>`;
    stats.leaderboard.forEach(([name, count]) => {
      const pct = stats.maxPicks > 0 ? Math.max(4, Math.round((count / stats.maxPicks) * 100)) : 0;
      html += `
        <div class="leader-row">
          <div class="lname">${esc(name)}</div>
          <div class="lbar"><span style="width: ${pct}%;"></span></div>
          <div class="lcount">${count}</div>
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</section>`;

  // ---- On the Wheel ----
  html += `<section><div class="section-title">On the Wheel</div>`;
  if (eligibleSubs.length === 0) {
    html += `<div class="empty-note">The wheel is empty. Be the first to add a book above.</div>`;
  } else {
    const me = normName(myName);
    eligibleSubs.forEach(([name, book]) => {
      const canWithdraw = admin || (me && normName(name) === me);
      html += `
        <div class="card">
          <div class="card-row" style="align-items: flex-start;">
            <div style="flex:1; min-width:0;">
              <div class="name">${esc(name)}</div>
              <div class="submitted-book">${esc(book)}</div>
            </div>
            ${canWithdraw ? `<button class="btn-mini remove" data-withdraw="${attr(name)}">Withdraw</button>` : ''}
          </div>
        </div>
      `;
    });
  }
  html += `</section>`;


  // ---- Spin the Wheel ----
  html += `<section><div class="section-title">Spin the Wheel</div>`;
  if (eligibleCount === 0) {
    html += `<div class="wheel-empty">Add a book above to fill the wheel.</div>`;
  } else {
    html += `
      <div class="wheel-holder">
        <div class="wheel-pointer"></div>
        <canvas id="wheel-canvas" class="wheel-canvas"></canvas>
      </div>
      <div class="spin-caption">${eligibleCount} book${eligibleCount === 1 ? '' : 's'} on the wheel</div>
    `;
  }
  html += `<div class="spin-actions">`;
  if (admin) {
    html += `<button class="btn-primary" id="spin-btn" ${(eligibleCount === 0 || spinning) ? 'disabled' : ''}>${spinning ? 'Spinning…' : 'Spin the Wheel'}</button>`;
  } else {
    html += `<div style="font-size: 12px; color: #a9b8ae; font-style: italic;">Only the librarian can spin the wheel.</div>`;
  }
  html += `</div></section>`;

  // ---- Past Reads ----
  html += `<section><div class="section-title">Past Reads</div>`;
  if (state.history.length === 0) {
    html += `<div class="empty-note">No picks recorded yet.</div>`;
  } else {
    html += `<div class="card no-rule">`;
    state.history.slice(0, 25).forEach(h => {
      html += `
        <div class="history-item">
          <span><span class="h-who">${esc(h.winner)}</span> — ${esc(h.book || '')}</span>
          <span>Round ${h.round} · ${fmtDate(h.ts)}</span>
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</section>`;

  // ---- Footer ----
  html += `<footer>`;
  html += `Shared with everyone who has this link.<br/>`;
  if (admin) {
    html += `<button class="btn-ghost" id="lock-btn">Lock librarian mode</button>`;
    html += `<button class="btn-ghost" id="reset-pool-btn">Reset the pool</button>`;
    html += `<button class="btn-ghost" id="reset-btn">Reset the shelf</button>`;
  } else {
    html += `<button class="btn-ghost" id="unlock-btn">Librarian mode</button>`;
  }
  html += `</footer>`;

  app.innerHTML = html;
  wireUp();
  requestAnimationFrame(paintWheel);
}

function renderSetupNotice() {
  return `
    <header>
      <div class="eyebrow">Setup required</div>
      <h1>The Shelf</h1>
      <div class="rule"></div>
    </header>
    <div class="setup">
      <h2>Connect Supabase to get started</h2>
      <p>See the README for setup steps.</p>
    </div>
  `;
}

function wireUp() {
  const submitBtn = document.getElementById("my-submit");
  if (submitBtn) submitBtn.addEventListener("click", () => {
    const name = document.getElementById("my-name").value;
    const book = document.getElementById("my-book").value;
    submitMyBook(name, book);
    document.getElementById("my-book").value = "";
  });
  const bookInput = document.getElementById("my-book");
  if (bookInput) bookInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitBtn && submitBtn.click();
  });

  document.querySelectorAll("[data-withdraw]").forEach(el => {
    el.addEventListener("click", () => withdrawSubmission(el.dataset.withdraw));
  });

  const spinBtn = document.getElementById("spin-btn");
  if (spinBtn) spinBtn.addEventListener("click", runDraw);

  const unlock = document.getElementById("unlock-btn");
  if (unlock) unlock.addEventListener("click", () => promptLibrarianPassword());
  const lock = document.getElementById("lock-btn");
  if (lock) lock.addEventListener("click", () => { clearAdminPw(); render(); });
  const resetPool = document.getElementById("reset-pool-btn");
  if (resetPool) resetPool.addEventListener("click", () => {
    if (!confirm("Reset the pool? Everyone who's been picked recently goes back into the running and can be picked again.")) return;
    callAdmin("reset_pool", {});
  });
  const reset = document.getElementById("reset-btn");
  if (reset) reset.addEventListener("click", () => {
    if (!confirm("Wipe the entire ledger — history, submissions, everything. This cannot be undone. Sure?")) return;
    callAdmin("reset", {});
  });
}

window.addEventListener("resize", () => {
  if (!spinning) paintWheel();
});

// ---------- Boot ----------
loadAll();
subscribeRealtime();
window.addEventListener("focus", () => queueRefresh());
</script>
</body>
</html>
