<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt: #16241F;
    --felt-dark: #101B17;
    --card: #F2E8D5;
    --card-shadow: #d8c9a8;
    --ink: #26231C;
    --ink-soft: #6b6455;
    --stamp: #A23E2F;
    --green: #3D5A4C;
    --brass: #B99657;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.03), transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px),
      var(--felt);
    min-height: 100vh;
    font-family: 'Courier Prime', monospace;
    color: var(--card);
    padding: 32px 16px 80px;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }

  header{ text-align:center; margin-bottom: 36px; }
  .eyebrow{
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 10px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(40px, 9vw, 64px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .sub{
    font-size: 13px;
    color: #a9b8ae;
    margin-top: 10px;
    letter-spacing: 0.03em;
  }
  .rule{
    width: 64px; height: 2px; background: var(--stamp);
    margin: 18px auto 0;
  }

  section{ margin-bottom: 30px; }
  .section-title{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 19px;
    color: var(--brass);
    margin: 0 0 12px 2px;
  }

  .card{
    background: var(--card);
    color: var(--ink);
    border-radius: 2px;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    padding: 16px 18px;
    position: relative;
    margin-bottom: 10px;
  }
  .card.no-rule::before { display:none; }
  .card:not(.no-rule)::before{
    content:"";
    position:absolute; left:0; right:0; top:38px;
    height:1px; background: rgba(162,62,47,0.25);
  }
  .card-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    flex-wrap: wrap;
  }
  .name{
    font-family:'Fraunces', serif; font-weight:600; font-size:16px;
  }
  .status{
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft);
  }
  .card.eliminated{
    opacity: 0.55;
  }
  .stamp-mark{
    display:inline-block;
    border: 2px solid var(--stamp);
    color: var(--stamp);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    transform: rotate(-4deg);
    border-radius: 3px;
  }

  input[type=text], input[type=password]{
    font-family: 'Courier Prime', monospace;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--ink-soft);
    padding: 6px 2px;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    flex: 1;
    min-width: 120px;
  }
  input[type=text]::placeholder{ color: #9a8f77; }
  input[type=text]:focus, input[type=password]:focus{ border-bottom: 1px solid var(--stamp); }

  button{
    font-family: 'Courier Prime', monospace;
    cursor: pointer;
    border: none;
    border-radius: 2px;
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    transition: transform 0.1s ease;
  }
  button:active{ transform: scale(0.97); }
  button:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn-primary{ background: var(--stamp); color: var(--card); }
  .btn-ghost{ background: transparent; color: var(--card); border: 1px solid rgba(255,255,255,0.25); }
  .btn-mini{ background: var(--green); color: var(--card); padding: 6px 10px; font-size: 11px; }
  .btn-mini.remove{ background: transparent; color: var(--stamp); border: 1px solid var(--stamp); }

  .addrow{ display:flex; gap:8px; margin-top: 4px; align-items: center; }
  .addrow input{
    background: white;
    border: 1px solid rgba(38,35,28,0.2);
    border-radius: 2px;
    color: var(--ink);
    padding: 10px 12px;
    font-size: 13px;
  }
  .addrow input:focus{
    border-color: var(--stamp);
    outline: none;
  }
  .addrow input::placeholder{ color: var(--ink-soft); opacity: 0.7; }

  .drawer{
    text-align: center;
    padding: 26px 18px;
    border: 1px solid rgba(185,150,87,0.35);
    border-radius: 3px;
    background: rgba(0,0,0,0.15);
  }
  .drawcard{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 26px;
    min-height: 36px;
    margin-bottom: 14px;
    color: var(--brass);
  }
  .drawcard.settled{ color: var(--card); }

  .winner-banner{
    background: var(--card);
    color: var(--ink);
    border-radius: 3px;
    padding: 20px;
    text-align:center;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    margin-top: 16px;
  }
  .winner-banner .stampbig{
    display:inline-block;
    border: 3px solid var(--stamp);
    color: var(--stamp);
    font-family:'Fraunces', serif;
    font-weight:700;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding: 4px 12px;
    transform: rotate(-3deg);
    border-radius: 4px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .winner-banner .wname{
    font-family:'Fraunces', serif; font-weight:700; font-size: 24px;
  }
  .winner-banner .wbook{ font-size: 13px; color: var(--ink-soft); margin-top: 4px; font-style: italic; }

  .cycle-banner{
    background: var(--green); color: var(--card);
    border-radius: 3px; padding: 12px 16px; font-size: 12.5px;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .flash{
    background: var(--stamp); color: var(--card);
    border-radius: 3px; padding: 10px 14px; font-size: 12px;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .flash.info{ background: var(--green); }

  .history-item{
    display:flex; justify-content:space-between; gap: 10px;
    font-size: 12.5px; padding: 8px 2px; border-bottom: 1px dotted rgba(38,35,28,0.15);
    color: var(--ink-soft);
  }
  .history-item:last-child{ border-bottom: none; }
  .history-item .h-who{ color: var(--ink); font-weight: 700; }
  .empty-note{ font-size: 12.5px; color: #93a19a; padding: 6px 2px; }

  /* Reading Room / dashboard */
  .stat-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 560px){ .stat-grid{ grid-template-columns: repeat(2, 1fr); } }
  .stat-card{
    background: var(--card);
    color: var(--ink);
    border-radius: 2px;
    box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
    padding: 14px 14px 16px;
    text-align: left;
  }
  .stat-card .stat-label{
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stamp);
    margin-bottom: 6px;
  }
  .stat-card .stat-number{
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 34px; line-height: 1;
  }
  .stat-card .stat-suffix{
    font-size: 11px; color: var(--ink-soft); margin-top: 4px; font-style: italic;
  }

  .leader-row{
    display:flex; align-items:center; gap: 10px;
    padding: 6px 0;
    font-size: 13px; color: var(--ink);
  }
  .leader-row .lname{ min-width: 120px; font-family:'Fraunces', serif; font-weight: 600; }
  .leader-row .lbar{
    flex: 1; height: 8px; background: rgba(162,62,47,0.15); border-radius: 999px; overflow: hidden;
  }
  .leader-row .lbar > span{ display:block; height: 100%; background: var(--stamp); }
  .leader-row .lcount{ min-width: 24px; text-align: right; color: var(--ink-soft); font-size: 12px; }

  .genre-row{
    display:flex; justify-content:space-between; padding: 5px 0;
    font-size: 12.5px; color: var(--ink);
    border-bottom: 1px dotted rgba(38,35,28,0.12);
  }
  .genre-row:last-child{ border-bottom: none; }

  footer{
    text-align:center; margin-top: 40px; font-size: 11px; color: #7f8f84;
  }
  footer button{ margin-top: 8px; margin-left: 4px; margin-right: 4px; }

  .loading{ text-align:center; padding: 60px 0; color: var(--brass); font-family:'Fraunces',serif; font-style: italic; }

  .setup{
    background: var(--card); color: var(--ink); border-radius: 3px;
    padding: 20px; box-shadow: 0 6px 0 var(--card-shadow), 0 10px 18px rgba(0,0,0,0.35);
  }
  .setup h2{ font-family:'Fraunces',serif; margin: 0 0 8px; color: var(--stamp); }
  .setup code{
    display:block; background: #efe3c8; padding: 8px 10px; border-radius: 2px;
    font-size: 12px; word-break: break-all; margin: 6px 0;
  }
  .setup p{ font-size: 13px; }

  .librarian-tag{
    display:inline-block; background: var(--brass); color: var(--felt);
    padding: 2px 8px; border-radius: 2px; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 700; margin-left: 8px;
  }

  /* Modal */
  .modal-back{
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 40; padding: 20px;
  }
  .modal{
    background: var(--card); color: var(--ink); padding: 22px 20px;
    border-radius: 3px; max-width: 380px; width: 100%;
    box-shadow: 0 6px 0 var(--card-shadow), 0 20px 40px rgba(0,0,0,0.5);
  }
  .modal h3{ font-family:'Fraunces',serif; margin: 0 0 6px; }
  .modal p{ font-size: 13px; color: var(--ink-soft); margin: 0 0 12px; }
  .modal input{
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--ink-soft); border-radius: 2px;
    font-family:'Courier Prime', monospace; background: white; color: var(--ink);
  }
  .modal-actions{ display:flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  .modal-actions button.btn-primary{ background: var(--stamp); color: var(--card); }
  .modal-actions button.btn-ghost{
    background: transparent; border: 1px solid var(--ink-soft); color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Pulling the ledger…</div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// ---------- Configuration ----------
// Fill these in after creating a Supabase project (see README).
const SUPABASE_URL = "https://yoobgxxyvcmsianfczam.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Ovyd_-OHfFzfUlT2mtirfw_73i3sYWv";

const CONFIGURED = !SUPABASE_URL.startsWith("REPLACE_") && !SUPABASE_ANON_KEY.startsWith("REPLACE_");
const supabase = CONFIGURED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// ---------- State ----------
const emptyState = () => ({ roster: [], eliminated: [], history: [], cycleNumber: 1 });
let state = emptyState();
let submissions = {};        // { memberName: bookTitle }
let spinning = false;
let flashMsg = null;         // { kind, text }
let lastWinner = null;       // { name, book }
let cycleNotice = null;      // number of just-completed cycle
let pendingRender = false;

const setFlash = (kind, text) => {
  flashMsg = { kind, text };
  setTimeout(() => { if (flashMsg && flashMsg.text === text) { flashMsg = null; render(); } }, 4000);
};

// ---------- Admin session ----------
const ADMIN_KEY = "shelf-admin-pw";
const isAdmin = () => !!sessionStorage.getItem(ADMIN_KEY);
const getAdminPw = () => sessionStorage.getItem(ADMIN_KEY) || "";
const setAdminPw = (pw) => sessionStorage.setItem(ADMIN_KEY, pw);
const clearAdminPw = () => sessionStorage.removeItem(ADMIN_KEY);

async function callAdmin(action, payload = {}) {
  const pw = getAdminPw();
  if (!pw) { promptLibrarianPassword(action, payload); return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ password: pw, action, payload }),
    });
    if (res.status === 401) {
      clearAdminPw();
      setFlash("err", "Wrong password. Locked back out.");
      render();
      return;
    }
    if (!res.ok) {
      const t = await res.text().catch(() => "");
      setFlash("err", `Admin action failed: ${t || res.statusText}`);
      return;
    }
    const body = await res.json();
    if (body.state) state = body.state;
    if (body.submissions) submissions = body.submissions;
    if (body.winner) { lastWinner = body.winner; }
    if (body.cycleCompleted) { cycleNotice = body.cycleCompleted; }
    render();
  } catch (err) {
    setFlash("err", `Network error: ${err.message}`);
  }
}

function promptLibrarianPassword(retryAction, retryPayload) {
  const back = document.createElement("div");
  back.className = "modal-back";
  back.innerHTML = `
    <div class="modal">
      <h3>Librarian Mode</h3>
      <p>Enter the admin password to unlock adding members, drawing cards, and resetting the ledger.</p>
      <input type="password" id="pw-input" autocomplete="current-password" placeholder="Password" />
      <div class="modal-actions">
        <button class="btn-ghost" id="pw-cancel">Cancel</button>
        <button class="btn-primary" id="pw-ok">Unlock</button>
      </div>
    </div>
  `;
  document.body.appendChild(back);
  const input = back.querySelector("#pw-input");
  input.focus();
  const close = () => document.body.removeChild(back);
  back.querySelector("#pw-cancel").addEventListener("click", close);
  const submit = async () => {
    const pw = input.value.trim();
    if (!pw) return;
    setAdminPw(pw);
    close();
    if (retryAction) callAdmin(retryAction, retryPayload);
    else render();
  };
  back.querySelector("#pw-ok").addEventListener("click", submit);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
}

// ---------- Data loading ----------
async function loadAll() {
  if (!CONFIGURED) { render(); return; }
  try {
    const [{ data: sData, error: sErr }, { data: subData, error: subErr }] = await Promise.all([
      supabase.from("shelf_state").select("data").eq("id", 1).single(),
      supabase.from("shelf_submissions").select("member_name, book"),
    ]);
    if (sErr && sErr.code !== "PGRST116") throw sErr;
    if (subErr) throw subErr;
    state = { ...emptyState(), ...(sData && sData.data ? sData.data : {}) };
    submissions = {};
    (subData || []).forEach(r => { submissions[r.member_name] = r.book; });
  } catch (err) {
    setFlash("err", `Couldn't load: ${err.message}`);
  }
  render();
}

function subscribeRealtime() {
  if (!CONFIGURED) return;
  supabase.channel("shelf-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "shelf_state" }, () => queueRefresh())
    .on("postgres_changes", { event: "*", schema: "public", table: "shelf_submissions" }, () => queueRefresh())
    .subscribe();
}
let refreshTimer = null;
function queueRefresh() {
  if (refreshTimer) return;
  refreshTimer = setTimeout(() => { refreshTimer = null; loadAll(); }, 300);
}

// ---------- Book submission (open to anyone) ----------
async function submitBook(name, book) {
  if (!CONFIGURED) return;
  book = book.trim();
  try {
    if (!book) {
      await supabase.from("shelf_submissions").delete().eq("member_name", name);
      delete submissions[name];
    } else {
      await supabase.from("shelf_submissions").upsert({ member_name: name, book });
      submissions[name] = book;
    }
    render();
  } catch (err) {
    setFlash("err", `Couldn't save: ${err.message}`);
  }
}

// ---------- Draw animation ----------
async function runDraw() {
  if (spinning) return;
  const eligible = Object.keys(submissions).filter(n => !state.eliminated.includes(n) && state.roster.includes(n));
  if (eligible.length === 0) { setFlash("err", "No eligible submissions to draw from."); return; }
  spinning = true;
  render();

  const el = document.getElementById("drawcard");
  let ticks = 0;
  const maxTicks = 18 + Math.floor(Math.random() * 6);
  await new Promise(resolve => {
    const interval = setInterval(() => {
      const flashName = eligible[Math.floor(Math.random() * eligible.length)];
      if (el) el.textContent = flashName;
      ticks++;
      if (ticks >= maxTicks) { clearInterval(interval); resolve(); }
    }, 90);
  });

  spinning = false;
  await callAdmin("draw", {});
}

// ---------- Rendering ----------
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str == null ? "" : String(str);
  return d.innerHTML;
}
function attr(str) {
  return String(str == null ? "" : str).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
  catch (e) { return ""; }
}

function computeStats() {
  const total = state.history.length;
  const perMember = {};
  state.roster.forEach(n => { perMember[n] = 0; });
  state.history.forEach(h => { if (perMember[h.winner] != null) perMember[h.winner]++; else perMember[h.winner] = 1; });
  const leaderboard = Object.entries(perMember).sort((a, b) => b[1] - a[1]);
  const maxPicks = leaderboard.reduce((m, [, c]) => Math.max(m, c), 0);
  const picksThisCycle = state.eliminated.length;
  const rosterSize = state.roster.length;
  const cycleProgress = rosterSize > 0 ? Math.round((picksThisCycle / rosterSize) * 100) : 0;
  const submittedCount = Object.keys(submissions).filter(n => state.roster.includes(n) && !state.eliminated.includes(n)).length;
  return { total, leaderboard, maxPicks, picksThisCycle, rosterSize, cycleProgress, submittedCount };
}

function render(...args) {
  if (document.activeElement && (document.activeElement.tagName === "INPUT")) {
    pendingRender = true;
    return;
  }
  pendingRender = false;

  const app = document.getElementById("app");

  if (!CONFIGURED) {
    app.innerHTML = renderSetupNotice();
    return;
  }

  const stats = computeStats();
  const admin = isAdmin();
  const active = state.roster.filter(n => !state.eliminated.includes(n));
  const eligibleCount = Object.keys(submissions).filter(n => !state.eliminated.includes(n) && state.roster.includes(n)).length;

  let html = `
    <header>
      <div class="eyebrow">Circulation Ledger · Cycle ${state.cycleNumber}${admin ? '<span class="librarian-tag">Librarian</span>' : ''}</div>
      <h1>The Shelf</h1>
      <div class="sub">Submit a book. Draw a card. Once you're picked, you wait for the shelf to turn over.</div>
      <div class="rule"></div>
    </header>
  `;

  if (flashMsg) {
    html += `<div class="flash ${flashMsg.kind === 'info' ? 'info' : ''}">${esc(flashMsg.text)}</div>`;
  }

  if (cycleNotice) {
    html += `<div class="cycle-banner">Cycle ${cycleNotice} complete — every member's back in the stacks. Cycle ${state.cycleNumber} begins now.</div>`;
    cycleNotice = null;
  }

  if (lastWinner) {
    html += `
      <div class="winner-banner">
        <div class="stampbig">Selected</div>
        <div class="wname">${esc(lastWinner.name)}</div>
        <div class="wbook">${lastWinner.book ? esc(lastWinner.book) : ''}</div>
      </div>
    `;
  }

  // ---- Reading Room (stats) ----
  html += `<section><div class="section-title">Reading Room</div>`;
  html += `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Books Read</div>
        <div class="stat-number">${stats.total}</div>
        <div class="stat-suffix">all cycles</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Cycle</div>
        <div class="stat-number">${stats.picksThisCycle}<span style="font-size:16px; color:var(--ink-soft)">/${stats.rosterSize}</span></div>
        <div class="stat-suffix">${stats.cycleProgress}% through</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Members</div>
        <div class="stat-number">${stats.rosterSize}</div>
        <div class="stat-suffix">on the shelf</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In the Box</div>
        <div class="stat-number">${stats.submittedCount}</div>
        <div class="stat-suffix">books submitted</div>
      </div>
    </div>
  `;
  if (stats.total > 0) {
    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div style="font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--stamp); margin-bottom: 10px;">Ledger by Reader</div>`;
    stats.leaderboard.forEach(([name, count]) => {
      const pct = stats.maxPicks > 0 ? Math.max(4, Math.round((count / stats.maxPicks) * 100)) : 0;
      html += `
        <div class="leader-row">
          <div class="lname">${esc(name)}</div>
          <div class="lbar"><span style="width: ${pct}%;"></span></div>
          <div class="lcount">${count}</div>
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</section>`;

  // ---- Card Catalog (admin only) ----
  if (admin) {
    html += `
      <section>
        <div class="section-title">Card Catalog</div>
        <div class="card no-rule">
          <div class="addrow">
            <input type="text" id="new-member" placeholder="Add a member's name" />
            <button class="btn-mini" id="add-member-btn">File card</button>
          </div>
        </div>
      </section>
    `;
  }

  // ---- This Round ----
  html += `<section><div class="section-title">This Round</div>`;
  if (active.length === 0) {
    html += `<div class="empty-note">No one's on the shelf yet — a librarian needs to add members.</div>`;
  } else {
    active.forEach(name => {
      const submitted = submissions[name];
      html += `
        <div class="card">
          <div class="card-row">
            <div class="name">${esc(name)}</div>
            ${submitted ? `<span class="status">Submitted</span>` : `<span class="status">Awaiting</span>`}
          </div>
          <div class="addrow" style="margin-top:8px;">
            <input type="text" placeholder="Book title" value="${attr(submitted || '')}"
              data-submit-for="${attr(name)}"
              onkeydown="if(event.key==='Enter'){ this.blur(); }" />
            ${submitted ? `<button class="btn-mini remove" data-clear="${attr(name)}">Clear</button>` : ''}
            ${admin ? `<button class="btn-mini remove" data-remove="${attr(name)}">Remove</button>` : ''}
          </div>
        </div>
      `;
    });
  }
  html += `</section>`;

  // ---- Checked out this cycle ----
  const eliminatedThisCycle = state.roster.filter(n => state.eliminated.includes(n));
  if (eliminatedThisCycle.length) {
    html += `<section><div class="section-title">Checked Out — Cycle ${state.cycleNumber}</div>`;
    eliminatedThisCycle.forEach(name => {
      html += `
        <div class="card eliminated">
          <div class="card-row">
            <div class="name">${esc(name)}</div>
            <span class="stamp-mark">Checked Out</span>
          </div>
        </div>
      `;
    });
    html += `</section>`;
  }

  // ---- Draw ----
  html += `
    <section>
      <div class="section-title">Draw</div>
      <div class="drawer">
        <div class="drawcard" id="drawcard">${spinning ? '…' : (eligibleCount > 0 ? eligibleCount + ' card' + (eligibleCount === 1 ? '' : 's') + ' in the box' : 'The box is empty')}</div>
        ${admin
          ? `<button class="btn-primary" id="draw-btn" ${(eligibleCount === 0 || spinning) ? 'disabled' : ''}>${spinning ? 'Drawing…' : 'Draw a Card'}</button>`
          : `<div style="font-size: 12px; color: #a9b8ae; font-style: italic;">Only the librarian can pull a card. Submit a book above.</div>`
        }
      </div>
    </section>
  `;

  // ---- Ledger ----
  html += `<section><div class="section-title">Ledger</div>`;
  if (state.history.length === 0) {
    html += `<div class="empty-note">No picks recorded yet.</div>`;
  } else {
    html += `<div class="card no-rule">`;
    state.history.slice(0, 25).forEach(h => {
      html += `
        <div class="history-item">
          <span><span class="h-who">${esc(h.winner)}</span> — ${esc(h.book || '')}</span>
          <span>Cycle ${h.cycle} · ${fmtDate(h.ts)}</span>
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</section>`;

  // ---- Footer ----
  html += `<footer>`;
  html += `Shared with everyone who has this link.<br/>`;
  if (admin) {
    html += `<button class="btn-ghost" id="lock-btn">Lock librarian mode</button>`;
    html += `<button class="btn-ghost" id="reset-btn">Reset the shelf</button>`;
  } else {
    html += `<button class="btn-ghost" id="unlock-btn">Librarian mode</button>`;
  }
  html += `</footer>`;

  app.innerHTML = html;
  wireUp();
}

function renderSetupNotice() {
  return `
    <header>
      <div class="eyebrow">Setup required</div>
      <h1>The Shelf</h1>
      <div class="rule"></div>
    </header>
    <div class="setup">
      <h2>Connect Supabase to get started</h2>
      <p>This app needs a Supabase project so everyone in the book club can share the same state.</p>
      <ol style="font-size:13px; line-height:1.6;">
        <li>Create a free Supabase project at <b>supabase.com</b>.</li>
        <li>Run the SQL in <code>supabase/schema.sql</code> in the SQL editor.</li>
        <li>Deploy the edge function in <code>supabase/functions/admin-update</code> and set its <b>ADMIN_PASSWORD</b> secret.</li>
        <li>Edit <code>index.html</code> and replace <b>SUPABASE_URL</b> and <b>SUPABASE_ANON_KEY</b> with your project values.</li>
      </ol>
      <p>Full instructions are in the README.</p>
    </div>
  `;
}

function wireUp() {
  const add = document.getElementById("add-member-btn");
  if (add) add.addEventListener("click", () => {
    const input = document.getElementById("new-member");
    const name = input.value.trim();
    if (!name) return;
    input.value = "";
    callAdmin("add_member", { name });
  });
  const newMember = document.getElementById("new-member");
  if (newMember) newMember.addEventListener("keydown", (e) => {
    if (e.key === "Enter") add && add.click();
  });

  document.querySelectorAll("[data-submit-for]").forEach(el => {
    el.addEventListener("blur", () => {
      const name = el.dataset.submitFor;
      submitBook(name, el.value);
      if (pendingRender) render();
    });
  });
  document.querySelectorAll("[data-clear]").forEach(el => {
    el.addEventListener("click", () => submitBook(el.dataset.clear, ""));
  });
  document.querySelectorAll("[data-remove]").forEach(el => {
    el.addEventListener("click", () => {
      if (!confirm(`Remove ${el.dataset.remove} from the shelf?`)) return;
      callAdmin("remove_member", { name: el.dataset.remove });
    });
  });

  const drawBtn = document.getElementById("draw-btn");
  if (drawBtn) drawBtn.addEventListener("click", runDraw);

  const unlock = document.getElementById("unlock-btn");
  if (unlock) unlock.addEventListener("click", () => promptLibrarianPassword());
  const lock = document.getElementById("lock-btn");
  if (lock) lock.addEventListener("click", () => { clearAdminPw(); render(); });
  const reset = document.getElementById("reset-btn");
  if (reset) reset.addEventListener("click", () => {
    if (!confirm("This clears the whole roster, history, and ledger for everyone. Are you sure?")) return;
    callAdmin("reset", {});
  });
}

// ---------- Boot ----------
loadAll();
subscribeRealtime();
window.addEventListener("focus", () => queueRefresh());
</script>
</body>
</html>
