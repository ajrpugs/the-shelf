// ---------- Wheel ----------
const WHEEL_COLORS = [
  "#c94a37", "#6a8672", "#e0b45a", "#7a4d6a",
  "#4a6d8a", "#8f6b3d", "#c26f3f", "#5f6577",
];

function eligibleEntries() {
  const elim = new Set(state.eliminated);
  return users
    .filter(u => u.book && u.book.trim() && !elim.has(u.id))
    .map(u => ({ id: u.id, name: u.discord_username || "Reader", book: u.book, avatar_url: u.avatar_url }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

// Book-cover images drawn as the background of each wheel slice. Kept as live
// <img> elements (canvas can only draw already-loaded images) keyed by reader
// id, and re-resolved when a reader's book changes.
const wheelCoverImages = {}; // id -> { book, img: HTMLImageElement | null, meta }

function ensureWheelCover(entry) {
  const book = entry.book || "";
  const cached = wheelCoverImages[entry.id];
  if (cached && cached.book === book) return cached;
  const record = { book, img: null, meta: null };
  wheelCoverImages[entry.id] = record;
  resolveBookMeta(book).then(meta => {
    if (wheelCoverImages[entry.id] !== record) return;
    record.meta = meta;
    if (meta.cover) {
      const img = new Image();
      img.onload = () => { if (!spinning) paintWheel(); };
      img.src = meta.cover;
      record.img = img;
    }
    if (!spinning) paintWheel(); // year/pages may render even without a cover
  });
  return record;
}

function preloadWheelCovers(entries) {
  entries.forEach(ensureWheelCover);
}

function drawWheel(canvas, entries, rotation) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const size = Math.max(200, Math.round(rect.width || 320));
  if (canvas.width !== size * dpr) {
    canvas.width = size * dpr;
    canvas.height = size * dpr;
  }
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2, cy = size / 2, radius = size / 2 - 6;
  const N = entries.length;
  if (N === 0) return;

  const anglePer = (2 * Math.PI) / N;
  const bookFontSize = N > 12 ? 11 : N > 8 ? 12 : 14;
  const nameFontSize = N > 12 ? 9 : N > 8 ? 10 : 11;
  const maxWidth = radius - 44;

  function truncateToWidth(text, font) {
    ctx.font = font;
    let display = text;
    while (ctx.measureText(display).width > maxWidth && display.length > 3) {
      display = display.slice(0, -2) + "…";
    }
    return display;
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  entries.forEach((entry, i) => {
    const start = i * anglePer - Math.PI / 2;
    const end = start + anglePer;
    const mid = (start + end) / 2;

    // Wedge path — used both as the fill region and as a clip for the cover.
    function wedgePath() {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, radius, start, end);
      ctx.closePath();
    }

    // Base color: a fallback for readers with no cover, and a tint underneath.
    wedgePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();

    // Cover art as the slice background, clipped to the wedge and cover-fit so
    // it fills the whole slab. A dark wash over it keeps the cream text legible.
    const rec = wheelCoverImages[entry.id];
    const img = rec && rec.img;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.save();
      wedgePath();
      ctx.clip();
      ctx.rotate(mid); // slice mid-line now runs along +x
      const half = anglePer / 2;
      const boxW = radius;
      const boxH = 2 * radius * Math.sin(half);
      const scale = Math.max(boxW / img.naturalWidth, boxH / img.naturalHeight);
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, boxW / 2 - dw / 2, -dh / 2, dw, dh);
      ctx.fillStyle = "rgba(20, 16, 12, 0.46)";
      ctx.fillRect(0, -radius, radius + 2, 2 * radius);
      ctx.restore();
    }

    // Slice outline, drawn last so it sits on top of the cover.
    wedgePath();
    ctx.strokeStyle = "rgba(15, 15, 15, 0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    ctx.rotate(mid);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    // Shadow so text holds up over any cover art behind it.
    ctx.shadowColor = "rgba(0, 0, 0, 0.7)";
    ctx.shadowBlur = 4;

    const bookFont = `600 ${bookFontSize}px "Fraunces", serif`;
    const nameFont = `italic ${nameFontSize}px "Fraunces", serif`;
    const bookDisplay = truncateToWidth(entry.book || "", bookFont);
    const nameDisplay = truncateToWidth(entry.name || "", nameFont);

    ctx.fillStyle = "#F2E8D5";
    ctx.font = bookFont;
    ctx.fillText(bookDisplay, radius - 14, -bookFontSize * 0.55);

    ctx.fillStyle = "rgba(242,232,213,0.82)";
    ctx.font = nameFont;
    ctx.fillText(nameDisplay, radius - 14, bookFontSize * 0.65);

    // Compact year · pages line, once metadata is in and slices aren't tiny.
    const meta = wheelCoverImages[entry.id] && wheelCoverImages[entry.id].meta;
    const metaText = meta ? fmtMeta(meta) : "";
    if (metaText && N <= 12) {
      const metaFont = `${Math.max(8, nameFontSize - 1)}px "Fraunces", serif`;
      ctx.fillStyle = "rgba(242,232,213,0.6)";
      ctx.font = metaFont;
      ctx.fillText(truncateToWidth(metaText, metaFont), radius - 14, bookFontSize * 0.65 + nameFontSize + 2);
    }

    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, 2 * Math.PI);
  ctx.fillStyle = "#F2E8D5";
  ctx.fill();
  ctx.strokeStyle = "#A23E2F";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.font = 'italic 12px "Fraunces", serif';
  ctx.fillStyle = "#A23E2F";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Shelf", 0, 0);

  ctx.restore();
}

function paintWheel() {
  const canvas = document.getElementById("wheel-canvas");
  if (!canvas) return;
  const entries = eligibleEntries();
  preloadWheelCovers(entries);
  drawWheel(canvas, entries, 0);
}

async function spinToWinner(canvas, entries, winnerIdx) {
  const N = entries.length;
  const anglePer = (2 * Math.PI) / N;
  const jitter = (Math.random() - 0.5) * anglePer * 0.65;
  const targetR = -(winnerIdx + 0.5) * anglePer + jitter;
  const spins = 6;
  const finalR = targetR + spins * 2 * Math.PI;

  const duration = 5200;
  const start = performance.now();
  return new Promise(resolve => {
    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 4);
      const rotation = finalR * eased;
      drawWheel(canvas, entries, rotation);
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

async function runDraw() {
  if (spinning) return;
  const entries = eligibleEntries();
  if (entries.length === 0) { setFlash("err", "No eligible readers — everyone needs a book set."); return; }
  preloadWheelCovers(entries);
  const pw = getAdminPw();
  if (!pw) { promptLibrarianPassword("draw", {}); return; }

  const canvas = document.getElementById("wheel-canvas");
  const btn = document.getElementById("spin-btn");
  if (!canvas) return;
  spinning = true;
  if (btn) { btn.disabled = true; btn.textContent = "Choosing…"; }

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ password: pw, action: "draw", payload: {} }),
    });
    if (res.status === 401) {
      spinning = false;
      clearAdminPw();
      setFlash("err", "Wrong password. Locked back out.");
      render();
      return;
    }
    if (!res.ok) {
      spinning = false;
      const t = await res.text().catch(() => "");
      setFlash("err", `Draw failed: ${t || res.statusText}`);
      render();
      return;
    }
    const body = await res.json();
    const winner = body.winner || {};
    let winnerIdx = entries.findIndex(e => e.id === winner.winner_id);
    if (winnerIdx < 0) winnerIdx = 0;
    await spinToWinner(canvas, entries, winnerIdx);
    spinning = false;
    const prevRound = state.roundNumber;
    if (body.state) state = normalizeState(body.state);
    if (body.roundAdvanced && state.roundNumber > prevRound) {
      setFlash("info", `Round ${prevRound} closed. Round ${state.roundNumber} is open — everyone's back on the shelf.`);
    }
    render();
  } catch (err) {
    spinning = false;
    setFlash("err", `Network error: ${err.message}`);
    render();
  }
}

// ---------- Rendering ----------
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str == null ? "" : String(str);
  return d.innerHTML;
}
function attr(str) {
  return String(str == null ? "" : str).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
  catch (e) { return ""; }
}

function computeStats() {
  const total = state.history.length;
  // Aggregate leaderboard by winner_id when present (survives username changes),
  // fall back to name for legacy entries without an id.
  const perUser = {};
  state.history.forEach(h => {
    if (!h.winner_id && !h.winner_username) return; // anonymous pick — off the leaderboard
    const key = h.winner_id || `name:${h.winner_username}`;
    if (!perUser[key]) {
      perUser[key] = {
        key,
        name: h.winner_username,
        avatar: h.winner_id ? userAvatar(h.winner_id) : null,
        count: 0,
      };
    } else if (!perUser[key].avatar && h.winner_id) {
      perUser[key].avatar = userAvatar(h.winner_id);
    }
    perUser[key].count++;
  });
  const leaderboard = Object.values(perUser).sort((a, b) => b.count - a.count);
  const maxPicks = leaderboard.reduce((m, e) => Math.max(m, e.count), 0);

  const picksThisRound = state.eliminated.length;
  const submittedCount = eligibleEntries().length;
  const regulars = new Set(state.history.map(h => h.winner_username).filter(Boolean)).size;
  const roundsFinished = Math.max(0, state.roundNumber - 1);
  const totalReaders = users.length;
  const wonUserIds = new Set(state.history.map(h => h.winner_id).filter(Boolean));
  const neverPicked = users.filter(u => !wonUserIds.has(u.id)).length;
  const monthAgo = Date.now() - 30 * 24 * 3600 * 1000;
  const booksThisMonth = state.history.filter(h => {
    const t = new Date(h.ts).getTime();
    return Number.isFinite(t) && t > monthAgo;
  }).length;
  const perRoundAvg = roundsFinished > 0 ? (total / roundsFinished).toFixed(1) : "—";

  return {
    total, leaderboard, maxPicks, picksThisRound, submittedCount, regulars,
    roundsFinished, totalReaders, neverPicked, booksThisMonth, perRoundAvg
  };
}

function userAvatar(userId) {
  const u = users.find(u => u.id === userId);
  return u?.avatar_url || null;
}

// The Bibliomancer's Guild rubric: five categories × 20 = /100. Bands come
// from the average category score (total / 5) to match the rubric's per-
// category ranges: Excellent ≥16, Great ≥11, Good ≥6, else Bad.
function ratingBand(total) {
  if (total == null || !Number.isFinite(total)) return null;
  if (total >= 80) return { label: "Excellent", cls: "band-exc" };
  if (total >= 55) return { label: "Great", cls: "band-great" };
  if (total >= 30) return { label: "Good", cls: "band-good" };
  return { label: "Bad", cls: "band-bad" };
}
function ratingTotal(h) {
  const t = h && h.rating && h.rating.total;
  return Number.isFinite(t) ? t : null;
}

// A reader's stable identity: their Discord id when linked, else name-based
// (so unlinked pickers like "Hunter" still aggregate and get a profile).
function readerKey(id, name) {
  return id ? id : `name:${name || ""}`;
}
function readerHref(id, name) {
  return `#reader=${encodeURIComponent(readerKey(id, name))}`;
}

function render() {
  if (spinning) { pendingRender = true; return; }
  if (document.activeElement && document.activeElement.tagName === "INPUT") {
    pendingRender = true;
    return;
  }
  pendingRender = false;

  const app = document.getElementById("app");

  if (!CONFIGURED) {
    app.innerHTML = renderSetupNotice();
    return;
  }

  if (!session) {
    app.innerHTML = renderLoginGate();
    wireLoginGate();
    return;
  }

  const route = parseRoute();
  if (route.name === "book") {
    renderBookDetail(app, { kind: "past", round: route.round });
    return;
  }
  if (route.name === "shelf") {
    renderBookDetail(app, { kind: "shelf", userId: route.userId });
    return;
  }
  if (route.name === "tag") {
    renderTagPage(app, route.tag);
    return;
  }
  if (route.name === "reader") {
    renderReaderPage(app, route.key);
    return;
  }

  const stats = computeStats();
  const admin = isAdmin();
  const displayName = displayNameFromMeta(session.user);
  const avatar = session.user.user_metadata?.avatar_url;
  const myBook = (myUserRow?.book || "").trim();
  const iAmEliminated = state.eliminated.includes(session.user.id);
  const eligibleSubs = eligibleEntries();
  const eligibleCount = eligibleSubs.length;
  const currentPick = state.history[0];
  const currentPickAvatar = currentPick?.winner_id ? userAvatar(currentPick.winner_id) : null;

  let html = `
    <header>
      <div class="eyebrow">The Guild · Round ${state.roundNumber}${admin ? '<span class="librarian-tag">Librarian</span>' : ''}</div>
      <h1>The Shelf</h1>
      <div class="sub">Everyone drops a book on the shelf. The wheel picks one at random — that's the next read. Once you've been picked, you sit out until the whole shelf has had a turn.</div>
      <div class="rule"></div>
      <div class="signed-in-strip">
        ${avatar ? `<img class="avatar" src="${attr(avatar)}" alt="">` : ''}
        <span>Signed in as <b>${esc(displayName)}</b></span>
        <span class="sep">·</span>
        <button id="sign-out-btn">Sign out</button>
      </div>
    </header>
  `;

  if (flashMsg) {
    html += `<div class="flash ${flashMsg.kind === 'info' ? 'info' : ''}">${esc(flashMsg.text)}</div>`;
  }

  if (currentPick) {
    html += `
      <div class="winner-banner">
        <div class="stampbig">Next up</div>
        <div class="wn-top">
          <div class="cover-slot large" data-cover-title="${attr(currentPick.book || '')}"></div>
          <div class="wn-head">
            <div class="wbook">${currentPick.book ? `<a class="book-link" href="#book=${currentPick.round}">${esc(currentPick.book)}</a>` : '—'}</div>
            ${currentPick.book ? `<div class="wauthor" id="nextup-author"></div>` : ''}
            ${currentPick.book ? `<div class="wmeta book-meta" data-meta-title="${attr(currentPick.book)}"></div>` : ''}
            <div class="wname">
              picked by
              ${currentPickAvatar ? `<img class="avatar-mini" src="${attr(currentPickAvatar)}" alt="">` : ''}
              <a class="reader-link" href="${readerHref(currentPick.winner_id, currentPick.winner_username)}"><b>${esc(currentPick.winner_username)}</b></a>
            </div>
          </div>
        </div>
        ${currentPick.book ? `<div class="wdesc" id="nextup-desc"></div>` : ''}
        ${currentPick.book ? `<div class="wtags genre-tags" id="nextup-tags"></div>` : ''}
        ${currentPick.book ? `<a class="wmore" href="#book=${currentPick.round}">Full details →</a>` : ''}
      </div>
    `;
  }

  // ---- My book ----
  html += `
    <section>
      <div class="section-title">My book</div>
      <div class="card no-rule my-book-card">
        <div class="my-book-row">
          <input type="text" id="my-book" placeholder="What you'd like to read" value="${attr(myBook)}" autocomplete="off" />
          <button class="btn-primary" id="save-book">Save</button>
        </div>
        ${iAmEliminated
          ? `<div class="my-book-status waiting">Picked this round — see you next round.</div>`
          : myBook
            ? `<div class="my-book-status active">On the shelf<button class="link-clear" id="clear-book">clear</button></div>`
            : `<div class="my-book-status">Add a book to join the shelf.</div>`
        }
      </div>
    </section>
  `;

  // ---- On the shelf ----
  html += `<section><div class="section-title">On the shelf</div>`;
  if (eligibleSubs.length === 0) {
    html += `<div class="empty-note">The shelf is empty. Be the first to add a book above.</div>`;
  } else {
    eligibleSubs.forEach(entry => {
      html += `
        <div class="card">
          <div class="card-row" style="align-items: flex-start;">
            <span class="cover-slot small" data-cover-title="${attr(entry.book)}"></span>
            <div style="flex:1; min-width:0;">
              <div class="name"><span class="shelf-title" data-shelf-id="${attr(entry.id)}" data-link-title="${attr(entry.book)}">${esc(entry.book)}</span><span class="book-meta" data-meta-title="${attr(entry.book)}"></span></div>
              <div class="submitted-book">
                ${entry.avatar_url ? `<img class="avatar-mini" src="${attr(entry.avatar_url)}" alt="">` : ''}
                submitted by <a class="reader-link" href="${readerHref(entry.id, entry.name)}">${esc(entry.name)}</a>
              </div>
            </div>
          </div>
        </div>
      `;
    });
  }
  html += `</section>`;

  // ---- Choose our next read ----
  html += `<section><div class="section-title">Choose our next read</div>`;
  if (eligibleCount === 0) {
    html += `<div class="wheel-empty">Add a book above to fill the shelf.</div>`;
  } else {
    html += `
      <div class="wheel-holder">
        <div class="wheel-pointer"></div>
        <canvas id="wheel-canvas" class="wheel-canvas"></canvas>
      </div>
      <div class="spin-caption">${eligibleCount} book${eligibleCount === 1 ? '' : 's'} on the shelf</div>
    `;
  }
  html += `<div class="spin-actions">`;
  if (admin) {
    html += `<button class="btn-primary" id="spin-btn" ${(eligibleCount === 0 || spinning) ? 'disabled' : ''}>${spinning ? 'Choosing…' : 'Choose our next read'}</button>`;
  } else {
    html += `<div style="font-size: 12px; color: var(--muted); font-style: italic;">Only the librarian can choose the next read.</div>`;
  }
  html += `</div></section>`;

  // ---- Leaderboard (past reads, ranked by Guild rating) ----
  html += `<section><div class="section-title">Leaderboard</div>`;
  if (state.history.length === 0) {
    html += `<div class="empty-note">No picks recorded yet.</div>`;
  } else {
    html += `<div class="card no-rule">`;
    const ranked = [...state.history].sort((a, b) => {
      const ra = ratingTotal(a), rb = ratingTotal(b);
      if (ra == null && rb == null) return b.round - a.round; // both unrated: newest first
      if (ra == null) return 1;   // unrated sinks to the bottom
      if (rb == null) return -1;
      if (rb !== ra) return rb - ra; // higher rating first
      return b.round - a.round;   // tie-break: newest first
    });
    ranked.slice(0, 25).forEach(h => {
      const avatar = h.winner_id ? userAvatar(h.winner_id) : null;
      const total = ratingTotal(h);
      const band = ratingBand(total);
      html += `
        <div class="history-item">
          <span class="cover-slot tiny" data-cover-title="${attr(h.book || '')}"></span>
          <span class="h-content">
            ${h.winner_username
              ? `${avatar ? `<img class="avatar-mini" src="${attr(avatar)}" alt="">` : ''}<a class="h-who reader-link" href="${readerHref(h.winner_id, h.winner_username)}">${esc(h.winner_username)}</a> — <a class="book-link" href="#book=${h.round}">${esc(h.book || '')}</a>`
              : `<a class="book-link" href="#book=${h.round}">${esc(h.book || '')}</a>`}<span class="book-meta" data-meta-title="${attr(h.book || '')}"></span>
          </span>
          <span class="h-meta">Round ${h.round} · ${fmtDate(h.ts)}</span>
          ${admin
            ? `<button class="score-pill ${band ? band.cls : 'score-pill-empty'}" data-admin-rate="${attr(h.ts || '')}" title="Set score (librarian)">${band ? total : '＋'}</button>`
            : (band ? `<span class="score-pill ${band.cls}" title="${band.label} · ${total}/100">${total}</span>` : `<span class="score-pill" style="visibility:hidden">00</span>`)}
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</section>`;

  // ---- Stats ----
  // Club numbers render now; the API-derived tiles/blocks (pages, reading time,
  // superlatives, decades, genres) fill in via decorateStats once the Open
  // Library metadata for every past read resolves.
  html += `<section><div class="section-title">Stats</div>`;
  html += `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Books read</div>
        <div class="stat-number">${stats.total}</div>
        <div class="stat-suffix">all rounds</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pages turned</div>
        <div class="stat-number" id="stat-pages">—</div>
        <div class="stat-suffix">across the shelf</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg length</div>
        <div class="stat-number" id="stat-avg">—</div>
        <div class="stat-suffix">pages / book</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reading time</div>
        <div class="stat-number" id="stat-hours">—</div>
        <div class="stat-suffix">hours, roughly</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Readers</div>
        <div class="stat-number">${stats.totalReaders}</div>
        <div class="stat-suffix">signed in</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">On the shelf</div>
        <div class="stat-number">${stats.submittedCount}</div>
        <div class="stat-suffix">awaiting the pick</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Never picked</div>
        <div class="stat-number">${stats.neverPicked}</div>
        <div class="stat-suffix">still waiting</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Regulars</div>
        <div class="stat-number">${stats.regulars}</div>
        <div class="stat-suffix">unique winners</div>
      </div>
    </div>
  `;
  if (stats.total > 0) {
    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div class="mini-head">What we've been reading</div>`;
    html += `<div id="genre-tags" class="genre-tags"><span class="genre-loading">Reading the shelf…</span></div>`;
    html += `</div>`;

    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div class="mini-head">Size matters</div>`;
    html += `<div id="superlatives"><span class="genre-loading">Measuring the shelf…</span></div>`;
    html += `</div>`;

    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div class="mini-head">Reads by reader</div>`;
    stats.leaderboard.forEach(entry => {
      const pct = stats.maxPicks > 0 ? Math.max(4, Math.round((entry.count / stats.maxPicks) * 100)) : 0;
      const avatarEl = entry.avatar
        ? `<img class="leader-avatar" src="${attr(entry.avatar)}" alt="">`
        : `<span class="leader-avatar-placeholder"></span>`;
      html += `
        <div class="leader-row">
          ${avatarEl}
          <div class="lname"><a class="reader-link" href="#reader=${encodeURIComponent(entry.key)}">${esc(entry.name)}</a></div>
          <div class="lbar"><span style="width: ${pct}%;"></span></div>
          <div class="lcount">${entry.count}</div>
        </div>
      `;
    });
    html += `</div>`;

    html += `<div class="card no-rule" style="margin-top: 12px;">`;
    html += `<div class="mini-head">Reads by decade</div>`;
    html += `<div id="decade-chart"><span class="genre-loading">Sorting by era…</span></div>`;
    html += `</div>`;
  }
  html += `</section>`;

  // ---- Librarian tools (admin only, at the bottom) ----
  if (admin) {
    const lastPick = state.history[0];
    const undoDesc = lastPick
      ? `Reverses the pick of "${lastPick.book}" by ${lastPick.winner_username}.`
      : `No picks yet to undo.`;
    html += `
      <section>
        <div class="section-title">Librarian tools</div>
        <div class="card no-rule">
          <div class="tool-row">
            <button class="btn-primary" id="undo-btn" ${state.history.length === 0 ? 'disabled' : ''}>Undo last spin</button>
            <span class="tool-row-desc">${esc(undoDesc)}</span>
          </div>
        </div>
        <div class="card no-rule" style="margin-top:10px;">
          <div class="tools-label">Manage readers</div>
    `;
    if (users.length === 0) {
      html += `<div class="empty-note">No signed-in readers yet.</div>`;
    } else {
      const sorted = [...users].sort((a, b) => (a.discord_username || '').localeCompare(b.discord_username || ''));
      sorted.forEach(u => {
        const eliminated = state.eliminated.includes(u.id);
        const book = (u.book || '').trim();
        html += `
          <div class="user-row">
            ${u.avatar_url
              ? `<img class="leader-avatar" src="${attr(u.avatar_url)}" alt="">`
              : `<span class="leader-avatar-placeholder"></span>`}
            <div class="user-row-content">
              <div class="user-row-name">${esc(u.discord_username || 'Reader')}${eliminated ? `<span class="user-row-tag">Picked</span>` : ''}</div>
              <div class="user-row-book">${book ? esc(book) : 'no book set'}</div>
            </div>
            <div class="user-row-actions">
              <button class="btn-mini" data-admin-editbook="${attr(u.id)}">Edit book</button>
              ${book ? `<button class="btn-mini remove" data-admin-clear="${attr(u.id)}">Clear book</button>` : ''}
              <button class="btn-mini remove" data-admin-remove="${attr(u.id)}">Remove</button>
            </div>
          </div>
        `;
      });
    }
    html += `</div></section>`;
  }

  // ---- Footer ----
  html += `<footer>`;
  html += `Shared with everyone in the guild · <a href="https://discord.gg/4YeGJgs8u" target="_blank" rel="noopener" class="footer-link">Join the Discord</a><br/>`;
  if (admin) {
    html += `<button class="btn-ghost" id="lock-btn">Lock librarian mode</button>`;
    html += `<button class="btn-danger" id="reset-btn">Reset the shelf</button>`;
  } else {
    html += `<button class="btn-ghost" id="unlock-btn">Librarian mode</button>`;
  }
  html += `</footer>`;

  app.innerHTML = html;
  wireUp();
  requestAnimationFrame(paintWheel);
  decorateCovers();
  decorateMeta();
  decorateShelfLinks();
  decorateNextUp();
  decorateStats();
}

// ---------- Router + book detail page ----------
function parseRoute() {
  const hash = location.hash || "";
  const book = hash.match(/^#book=(\d+)$/);
  if (book) return { name: "book", round: parseInt(book[1], 10) };
  const shelf = hash.match(/^#shelf=(.+)$/);
  if (shelf) return { name: "shelf", userId: decodeURIComponent(shelf[1]) };
  const tag = hash.match(/^#tag=(.+)$/);
  if (tag) return { name: "tag", tag: decodeURIComponent(tag[1]) };
  const reader = hash.match(/^#reader=(.+)$/);
  if (reader) return { name: "reader", key: decodeURIComponent(reader[1]) };
  return { name: "main" };
}

function renderDetailMissing(app, back, loading, msg) {
  app.innerHTML = `
    <header><div class="eyebrow">The Guild</div><h1>The Shelf</h1><div class="rule"></div></header>
    ${back}
    <div class="setup">
      <h2>${loading ? 'Loading…' : 'Book not found'}</h2>
      <p>${loading ? 'Fetching the shelf.' : esc(msg)}</p>
    </div>`;
}

// ctx is { kind: "past", round } or { kind: "shelf", userId }. Past reads are
// keyed by round and shelf books by the reader's id, so the same title picked
// by several people still resolves to distinct pages.
function renderBookDetail(app, ctx) {
  window.scrollTo(0, 0);
  const back = `<a href="#" class="detail-back">← Back to the shelf</a>`;

  let book, eyebrow, metaLine, reviewHtml = "";
  if (ctx.kind === "past") {
    const h = state.history.find(e => e.round === ctx.round);
    if (!h) return renderDetailMissing(app, back, state.history.length === 0, `There's no past read for round ${ctx.round}.`);
    book = h.book;
    eyebrow = `Past read · Round ${h.round}`;
    const avatar = h.winner_id ? userAvatar(h.winner_id) : null;
    const who = h.winner_username
      ? `${avatar ? `<img class="avatar-mini" src="${attr(avatar)}" alt="">` : ''}<a class="reader-link" href="${readerHref(h.winner_id, h.winner_username)}"><b>${esc(h.winner_username)}</b></a>`
      : `<span class="detail-muted">no picker recorded</span>`;
    metaLine = `Picked by ${who} · Round ${h.round} · ${fmtDate(h.ts)}`;
    const total = ratingTotal(h);
    const band = ratingBand(total);
    if (band) {
      reviewHtml = `
        <div class="bd-block bd-review ${band.cls}">
          <div class="bd-block-head">Guild review</div>
          <div class="bd-review-row">
            <span class="bd-score">${total}<span class="bd-score-max">/100</span></span>
            <span class="score-pill ${band.cls}">${band.label}</span>
          </div>
        </div>`;
    }
  } else {
    const u = users.find(x => x.id === ctx.userId);
    if (!u || !(u.book || "").trim()) return renderDetailMissing(app, back, users.length === 0, `That book isn't on the shelf anymore.`);
    book = u.book;
    eyebrow = `On the shelf`;
    const avatar = u.avatar_url || null;
    metaLine = `Added by ${avatar ? `<img class="avatar-mini" src="${attr(avatar)}" alt="">` : ''}<a class="reader-link" href="${readerHref(u.id, u.discord_username)}"><b>${esc(u.discord_username || "Reader")}</b></a>`;
  }

  app.innerHTML = `
    <header><div class="eyebrow">${esc(eyebrow)}</div><h1>The Shelf</h1><div class="rule"></div></header>
    ${back}
    <div class="book-detail">
      <div class="bd-top">
        <div class="cover-slot xl" id="bd-cover"></div>
        <div class="bd-head">
          <div class="bd-title">${esc(book || '—')}</div>
          <div class="bd-author" id="bd-author"></div>
          <div class="bd-facts" id="bd-facts"><span class="detail-muted">Looking up…</span></div>
          <div class="bd-pick">${metaLine}</div>
        </div>
      </div>
      ${reviewHtml}
      <div id="bd-desc"></div>
      <div id="bd-firstline"></div>
      <div id="bd-subjects"></div>
      <div id="bd-people"></div>
      <div id="bd-extra"></div>
    </div>`;

  decorateBookDetail(book);
}

async function decorateBookDetail(book) {
  const hashAtCall = location.hash;
  const detail = await resolveBookDetail(book);
  if (location.hash !== hashAtCall) return; // navigated away

  const cover = document.getElementById("bd-cover");
  if (cover && !cover.dataset.done) {
    cover.dataset.done = "1";
    if (detail.coverLarge) insertCoverImg(cover, detail.coverLarge);
    else cover.classList.add("no-cover");
  }
  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };

  set("bd-author", detail.authors.length ? `by ${esc(detail.authors.join(", "))}` : "");

  const facts = [];
  if (detail.year) facts.push(`First published ${detail.year}`);
  if (detail.pages) facts.push(`${detail.pages} pages`);
  if (detail.editionCount) facts.push(`${detail.editionCount} edition${detail.editionCount === 1 ? '' : 's'}`);
  set("bd-facts", facts.length
    ? facts.map(f => `<span>${esc(f)}</span>`).join(`<span class="dot">·</span>`)
    : `<span class="detail-muted">No catalog data found on Open Library.</span>`);

  set("bd-desc", detail.description ? `<div class="bd-desc">${esc(detail.description)}</div>` : "");
  set("bd-firstline", detail.firstSentence ? `<div class="bd-quote">“${esc(detail.firstSentence)}”</div>` : "");

  const subs = [...new Set(cleanSubjects(detail.subjects))].slice(0, 16);
  set("bd-subjects", subs.length
    ? `<div class="bd-block"><div class="bd-block-head">Subjects</div><div class="genre-tags">${subs.map(s => `<a class="genre-tag genre-tag-link" href="#tag=${encodeURIComponent(s)}">${esc(titleCase(s))}</a>`).join("")}</div></div>`
    : "");

  const chip = (arr) => arr.map(s => `<span class="genre-tag">${esc(s)}</span>`).join("");
  let people = "";
  if (detail.persons.length) people += `<div class="bd-block"><div class="bd-block-head">Characters</div><div class="genre-tags">${chip(detail.persons)}</div></div>`;
  if (detail.places.length) people += `<div class="bd-block"><div class="bd-block-head">Settings</div><div class="genre-tags">${chip(detail.places)}</div></div>`;
  set("bd-people", people);

  const extra = [];
  if (detail.publishers.length) extra.push(`<div><span class="bd-k">Publisher</span> ${esc(detail.publishers.join(", "))}</div>`);
  if (detail.isbn.length) extra.push(`<div><span class="bd-k">ISBN</span> ${esc(detail.isbn[0])}</div>`);
  if (detail.olKey) extra.push(`<div><a class="footer-link" href="https://openlibrary.org${attr(detail.olKey)}" target="_blank" rel="noopener">View on Open Library ↗</a></div>`);
  set("bd-extra", extra.length ? `<div class="bd-block bd-extra">${extra.join("")}</div>` : "");
}

// Tag page: past reads that carry a given subject (from "What we've been
// reading"). tag is the normalized lowercase subject.
function renderTagPage(app, tag) {
  window.scrollTo(0, 0);
  const back = `<a href="#" class="detail-back">← Back to the shelf</a>`;
  app.innerHTML = `
    <header><div class="eyebrow">Tagged</div><h1>The Shelf</h1><div class="rule"></div></header>
    ${back}
    <section>
      <div class="section-title">${esc(titleCase(tag))}</div>
      <div id="tag-list" class="card no-rule"><span class="genre-loading">Finding books…</span></div>
    </section>`;
  decorateTagPage(tag);
}

async function decorateTagPage(tag) {
  const hashAtCall = location.hash;
  const entries = state.history.filter(h => h.book);
  const metas = await Promise.all(entries.map(h => resolveBookMeta(h.book)));
  if (location.hash !== hashAtCall) return; // navigated away
  const box = document.getElementById("tag-list");
  if (!box) return;
  const matches = entries.filter((h, i) => cleanSubjects((metas[i] || {}).subjects).includes(tag));
  if (matches.length === 0) {
    box.innerHTML = `<div class="empty-note">No past reads tagged “${esc(titleCase(tag))}”.</div>`;
    return;
  }
  box.innerHTML = matches.map(h => {
    const avatar = h.winner_id ? userAvatar(h.winner_id) : null;
    const total = ratingTotal(h);
    const band = ratingBand(total);
    return `
      <div class="history-item">
        <span class="cover-slot tiny" data-cover-title="${attr(h.book)}"></span>
        <span class="h-content">
          ${h.winner_username ? `${avatar ? `<img class="avatar-mini" src="${attr(avatar)}" alt="">` : ''}<a class="h-who reader-link" href="${readerHref(h.winner_id, h.winner_username)}">${esc(h.winner_username)}</a> — ` : ''}<a class="book-link" href="#book=${h.round}">${esc(h.book)}</a><span class="book-meta" data-meta-title="${attr(h.book)}"></span>
        </span>
        <span class="h-meta">Round ${h.round} · ${fmtDate(h.ts)}</span>
        ${band ? `<span class="score-pill ${band.cls}" title="${band.label} · ${total}/100">${total}</span>` : `<span class="score-pill" style="visibility:hidden">00</span>`}
      </div>`;
  }).join("");
  decorateCovers();
  decorateMeta();
}

// Reader profile: a picker's stats + their picks. key is a Discord id or
// "name:<name>" for unlinked pickers.
function renderReaderPage(app, key) {
  window.scrollTo(0, 0);
  const back = `<a href="#" class="detail-back">← Back to the shelf</a>`;

  let name = "Reader", avatar = null, userId = null;
  if (key.startsWith("name:")) {
    name = key.slice(5) || "Reader";
  } else {
    userId = key;
    const u = users.find(x => x.id === key);
    if (u) { name = u.discord_username || "Reader"; avatar = u.avatar_url || null; }
    else { const h = state.history.find(e => e.winner_id === key); if (h) name = h.winner_username; }
  }

  const picks = state.history.filter(h => readerKey(h.winner_id, h.winner_username) === key);
  const shelfUser = userId ? users.find(x => x.id === userId) : null;
  const shelfBook = shelfUser && (shelfUser.book || "").trim() ? shelfUser.book.trim() : null;

  if (picks.length === 0 && !shelfBook) {
    return renderDetailMissing(app, back, state.history.length === 0 && users.length === 0, `No reads recorded for ${name}.`);
  }

  const rated = picks.map(ratingTotal).filter(t => t != null);
  const avg = rated.length ? Math.round(rated.reduce((a, b) => a + b, 0) / rated.length) : null;
  const avgBand = ratingBand(avg);
  const best = rated.length ? Math.max(...rated) : null;
  const worst = rated.length ? Math.min(...rated) : null;
  const sorted = [...picks].sort((a, b) => {
    const ra = ratingTotal(a), rb = ratingTotal(b);
    if (ra == null && rb == null) return b.round - a.round;
    if (ra == null) return 1;
    if (rb == null) return -1;
    if (rb !== ra) return rb - ra;
    return b.round - a.round;
  });

  let html = `
    <header><div class="eyebrow">Reader</div><h1>The Shelf</h1><div class="rule"></div></header>
    ${back}
    <div class="reader-head">
      ${avatar ? `<img class="reader-avatar" src="${attr(avatar)}" alt="">` : `<span class="reader-avatar reader-avatar-ph"></span>`}
      <div class="reader-name">${esc(name)}</div>
    </div>
    <div class="stat-grid reader-stats">
      <div class="stat-card"><div class="stat-label">Books picked</div><div class="stat-number">${picks.length}</div><div class="stat-suffix">all rounds</div></div>
      <div class="stat-card"><div class="stat-label">Avg rating</div><div class="stat-number ${avgBand ? avgBand.cls : ''}">${avg != null ? avg : '—'}</div><div class="stat-suffix">${avgBand ? avgBand.label : 'unrated'}</div></div>
      <div class="stat-card"><div class="stat-label">Best</div><div class="stat-number ${ratingBand(best) ? ratingBand(best).cls : ''}">${best != null ? best : '—'}</div><div class="stat-suffix">highest pick</div></div>
      <div class="stat-card"><div class="stat-label">Worst</div><div class="stat-number ${ratingBand(worst) ? ratingBand(worst).cls : ''}">${worst != null ? worst : '—'}</div><div class="stat-suffix">lowest pick</div></div>
    </div>`;

  if (picks.length) {
    html += `<div class="card no-rule reader-extra">
      <span class="reader-extra-item">📖 <b id="reader-pages">…</b> pages picked</span>
      <span class="reader-extra-item">🏷️ Favorite genre: <b id="reader-genre">…</b></span>
    </div>`;
  }

  if (shelfBook) {
    html += `<div class="card no-rule reader-shelf"><span class="mini-head" style="margin:0 10px 0 0;">On the shelf now</span><a class="book-link" href="#shelf=${encodeURIComponent(userId)}">${esc(shelfBook)}</a></div>`;
  }

  html += `<section style="margin-top:16px;"><div class="section-title">Picks</div>`;
  if (picks.length === 0) {
    html += `<div class="empty-note">No picks have come up yet.</div>`;
  } else {
    html += `<div class="card no-rule">`;
    sorted.forEach(h => {
      const total = ratingTotal(h);
      const band = ratingBand(total);
      html += `
        <div class="history-item">
          <span class="cover-slot tiny" data-cover-title="${attr(h.book || '')}"></span>
          <span class="h-content"><a class="book-link" href="#book=${h.round}">${esc(h.book || '')}</a><span class="book-meta" data-meta-title="${attr(h.book || '')}"></span></span>
          <span class="h-meta">Round ${h.round} · ${fmtDate(h.ts)}</span>
          ${band ? `<span class="score-pill ${band.cls}" title="${band.label} · ${total}/100">${total}</span>` : `<span class="score-pill" style="visibility:hidden">00</span>`}
        </div>`;
    });
    html += `</div>`;
  }
  html += `</section>`;

  app.innerHTML = html;
  decorateCovers();
  decorateMeta();
  decorateReaderExtra(picks.map(h => h.book).filter(Boolean));
}

// Pages picked + favorite genre for a reader, from the metadata of their picks.
async function decorateReaderExtra(books) {
  if (!document.getElementById("reader-pages")) return;
  const metas = await Promise.all(books.map(resolveBookMeta));
  if (parseRoute().name !== "reader") return; // navigated away
  let pages = 0;
  const tally = {};
  metas.forEach(m => {
    if (m && m.pages) pages += m.pages;
    const seen = new Set();
    cleanSubjects(m && m.subjects).forEach(s => {
      if (s === "fiction") return; // too generic to be a "favorite genre"
      if (!seen.has(s)) { seen.add(s); tally[s] = (tally[s] || 0) + 1; }
    });
  });
  const top = Object.entries(tally).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))[0];
  const pg = document.getElementById("reader-pages");
  const gn = document.getElementById("reader-genre");
  if (pg) pg.textContent = pages ? pages.toLocaleString() : "—";
  if (gn) gn.textContent = top ? titleCase(top[0]) : "—";
}

function wireLoginGate() {

function wireUp() {
  const save = document.getElementById("save-book");
  if (save) save.addEventListener("click", () => {
    const val = document.getElementById("my-book").value;
    setMyBook(val);
  });
  const bookInput = document.getElementById("my-book");
  if (bookInput) bookInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") save && save.click();
  });
  const clear = document.getElementById("clear-book");
  if (clear) clear.addEventListener("click", () => {
    if (!confirm("Clear your book? You can add another anytime.")) return;
    setMyBook("");
  });

  const spinBtn = document.getElementById("spin-btn");
  if (spinBtn) spinBtn.addEventListener("click", runDraw);

  const undoBtn = document.getElementById("undo-btn");
  if (undoBtn) undoBtn.addEventListener("click", () => {
    const last = state.history[0];
    if (!last) return;
    if (!confirm(`Undo the pick of "${last.book}" by ${last.winner_username}?`)) return;
    callAdmin("undo_last_spin", {});
  });

  document.querySelectorAll("[data-admin-editbook]").forEach(el => {
    el.addEventListener("click", () => {
      const uid = el.dataset.adminEditbook;
      const u = users.find(x => x.id === uid);
      const current = (u?.book || "");
      const next = prompt(`Edit ${u?.discord_username || 'this reader'}'s book (silent — no Discord post):`, current);
      if (next === null) return; // cancelled
      if (next.trim() === current.trim()) return; // unchanged
      callAdmin("admin_set_book", { user_id: uid, book: next.trim() });
    });
  });
  document.querySelectorAll("[data-admin-clear]").forEach(el => {
    el.addEventListener("click", () => {
      const uid = el.dataset.adminClear;
      const u = users.find(x => x.id === uid);
      if (!confirm(`Clear ${u?.discord_username || 'this reader'}'s book?`)) return;
      callAdmin("admin_clear_book", { user_id: uid });
    });
  });
  document.querySelectorAll("[data-admin-remove]").forEach(el => {
    el.addEventListener("click", () => {
      const uid = el.dataset.adminRemove;
      const u = users.find(x => x.id === uid);
      if (!confirm(`Remove ${u?.discord_username || 'this reader'} from the shelf? Their past reads stay in the ledger, but they'll need to sign in again to rejoin.`)) return;
      callAdmin("admin_remove_user", { user_id: uid });
    });
  });

  document.querySelectorAll("[data-admin-rate]").forEach(el => {
    el.addEventListener("click", () => {
      const ts = el.dataset.adminRate;
      const h = state.history.find(x => x.ts === ts);
      const current = ratingTotal(h);
      const next = prompt(
        `Set the Guild score (0–100) for "${h?.book || 'this read'}". Leave blank to clear.`,
        current == null ? "" : String(current),
      );
      if (next === null) return; // cancelled
      const trimmed = next.trim();
      if (trimmed === "") {
        if (current == null) return; // already unrated
        callAdmin("admin_set_rating", { ts, total: null });
        return;
      }
      const n = Math.round(Number(trimmed));
      if (!Number.isFinite(n) || n < 0 || n > 100) { alert("Enter a number from 0 to 100."); return; }
      if (n === current) return; // unchanged
      callAdmin("admin_set_rating", { ts, total: n });
    });
  });

  const unlock = document.getElementById("unlock-btn");
  if (unlock) unlock.addEventListener("click", () => promptLibrarianPassword());
  const lock = document.getElementById("lock-btn");
  if (lock) lock.addEventListener("click", () => { clearAdminPw(); render(); });
  const reset = document.getElementById("reset-btn");
  if (reset) reset.addEventListener("click", () => {
    if (!confirm("Wipe the entire ledger — history, every reader's book, everything. This cannot be undone. Continue?")) return;
    promptResetConfirmation();
  });
  const signOutBtn = document.getElementById("sign-out-btn");
  if (signOutBtn) signOutBtn.addEventListener("click", signOut);
}

  if (!spinning) paintWheel();
});

initAuth();
window.addEventListener("hashchange", () => render());
window.addEventListener("focus", () => { if (session) queueRefresh(); });
